name: 🚀 Build & Deploy to Azure Container Apps

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:  # Allow manual triggers

env:
  REGISTRY: ${{ secrets.REGISTRY_LOGIN_SERVER }}
  IMAGE_NAME: tms-app
  NOTIFICATIONS_IMAGE_NAME: tms-notifications
  RESOURCE_GROUP: tms-rg
  APP_NAME: tms-app
  NOTIFICATIONS_APP_NAME: tms-notifications
  ENVIRONMENT: tms-env

jobs:
  # ──────────────────────────────────────────
  # JOB 1: Build & Push Main App Image
  # ──────────────────────────────────────────
  build-and-push-app:
    name: 🏗️ Build Main App
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔐 Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: 🏷️ Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Build & Push Main App Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production

  # ──────────────────────────────────────────
  # JOB 2: Build & Push Notification Service
  # ──────────────────────────────────────────
  build-and-push-notifications:
    name: 🔔 Build Notification Service
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔐 Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Build & Push Notifications Image
        uses: docker/build-push-action@v5
        with:
          context: ./notification-service
          file: ./notification-service/Dockerfile
          push: true
          tags: |
            ${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.NOTIFICATIONS_IMAGE_NAME }}:latest
            ${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.NOTIFICATIONS_IMAGE_NAME }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────
  # JOB 3: Deploy to Azure Container Apps
  # ──────────────────────────────────────────
  deploy:
    name: 🌐 Deploy to Azure
    runs-on: ubuntu-latest
    needs: [build-and-push-app, build-and-push-notifications]
    environment: production
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔐 Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: 🗄️ Run Database Migrations
        run: |
          cd backend
          npm ci --omit=dev
          echo "=== RUNNING BACKEND MIGRATIONS ===" > ../migration-debug.txt
          npx prisma db push --accept-data-loss >> ../migration-debug.txt 2>&1 || { echo "Backend migration failed" >> ../migration-debug.txt; exit 1; }
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: 🚀 Deploy Main App to Container Apps
        run: |
          echo "=== DEPLOYING MAIN APP ===" > ../deploy-debug.txt
          az containerapp ingress enable \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --target-port 5000 \
            --type external >> ../deploy-debug.txt 2>&1 || { echo "Main app ingress configuration failed" >> ../deploy-debug.txt; exit 1; }
          az containerapp update \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }} \
            --set-env-vars DATABASE_URL="${{ secrets.DATABASE_URL }}" JWT_SECRET="${{ secrets.JWT_SECRET }}" NODE_ENV=production PORT=5000 >> ../deploy-debug.txt 2>&1 || { echo "Main app deployment failed" >> ../deploy-debug.txt; exit 1; }

      - name: 🔔 Deploy Notification Service to Container Apps
        run: |
          echo "=== DEPLOYING NOTIFICATION SERVICE ===" >> ../deploy-debug.txt
          az containerapp ingress enable \
            --name ${{ env.NOTIFICATIONS_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --target-port 3001 \
            --type external >> ../deploy-debug.txt 2>&1 || { echo "Notification service ingress configuration failed" >> ../deploy-debug.txt; exit 1; }
          az containerapp update \
            --name ${{ env.NOTIFICATIONS_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.NOTIFICATIONS_IMAGE_NAME }}:sha-${{ github.sha }} \
            --set-env-vars DATABASE_URL="${{ secrets.DATABASE_URL }}" JWT_SECRET="${{ secrets.JWT_SECRET }}" NODE_ENV=production PORT=3001 >> ../deploy-debug.txt 2>&1 || { echo "Notification service deployment failed" >> ../deploy-debug.txt; exit 1; }

      - name: 📤 Upload Debug Logs on Failure
        if: failure()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f ../deploy-debug.txt ]; then
            cp ../deploy-debug.txt ./deploy-debug.txt
            git add -f deploy-debug.txt
          fi
          if [ -f ../migration-debug.txt ]; then
            cp ../migration-debug.txt ./migration-debug.txt
            git add -f migration-debug.txt
          fi
          git commit -m "chore: upload debug logs [skip ci]" || echo "No changes to commit"
          git push origin HEAD:${{ github.ref }}

      - name: 📋 Get Deployment URLs & Diagnostics
        run: |
          echo "## 🚀 Deployment Complete!" >> $GITHUB_STEP_SUMMARY
          APP_URL=$(az containerapp show --name ${{ env.APP_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} --query "properties.configuration.ingress.fqdn" -o tsv)
          NOTIF_URL=$(az containerapp show --name ${{ env.NOTIFICATIONS_APP_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "- **App URL**: https://$APP_URL" >> $GITHUB_STEP_SUMMARY
          echo "- **Notifications URL**: https://$NOTIF_URL" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          
          echo "=== MAIN APP CONFIG ==="
          az containerapp show --name ${{ env.APP_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} -o json || echo "Failed to show main app config"
          
          echo "=== MAIN APP REVISIONS ==="
          az containerapp revision list --name ${{ env.APP_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} -o table || echo "Failed to show revisions"
          
          echo "=== MAIN APP SYSTEM LOGS ==="
          az containerapp logs show --name ${{ env.APP_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} --type system --tail 100 || echo "No system logs available"
          
          echo "=== MAIN APP CONSOLE LOGS ==="
          az containerapp logs show --name ${{ env.APP_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} --type console --tail 100 || echo "No console logs available"
          
          echo "=== NOTIFICATIONS APP SYSTEM LOGS ==="
          az containerapp logs show --name ${{ env.NOTIFICATIONS_APP_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} --type system --tail 100 || echo "No system logs available"
          
          echo "=== NOTIFICATIONS APP CONSOLE LOGS ==="
          az containerapp logs show --name ${{ env.NOTIFICATIONS_APP_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} --type console --tail 100 || echo "No console logs available"



